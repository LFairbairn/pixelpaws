name: CI

# Temporarily disabled — no tests exist yet, so every run fails with
# pytest exit code 5 (no tests collected). Re-enable by restoring the
# push/pull_request triggers below once the first BDD scenario passes.
on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run black --check .

      - name: Run tests
        run: |
          xvfb-run -a uv run pytest --cov=src --cov-report=term-missing tests/
        env:
          SDL_AUDIODRIVER: dummy
